<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StreamPlay - Free Movie Player</title>
<meta name="description" content="Free movie streaming player with multi-server fallback and minimal ads." />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0b0b0f; color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  a { color: #e50914; text-decoration: none; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: linear-gradient(180deg, #141418 0%, #0b0b0f 100%);
    border-bottom: 1px solid #1f1f24; position: sticky; top: 0; z-index: 10;
  }
  .brand { font-size: 22px; font-weight: 800; letter-spacing: 1px; color: #e50914; }
  .brand span { color: #f5f5f7; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .input-row {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px;
  }
  .input-row input {
    flex: 1; min-width: 240px;
    background: #17171c; border: 1px solid #2a2a31; color: #fff;
    padding: 12px 14px; border-radius: 8px; font-size: 15px; outline: none;
    transition: border .15s ease;
  }
  .input-row input:focus { border-color: #e50914; }
  .btn {
    background: #e50914; color: #fff; border: 0; padding: 12px 18px;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: transform .08s ease, background .15s ease;
  }
  .btn:hover { background: #f6121d; }
  .btn:active { transform: scale(.98); }
  .btn.secondary { background: #2a2a31; }
  .btn.secondary:hover { background: #353541; }

  .player-wrap {
    position: relative; width: 100%;
    aspect-ratio: 16 / 9;
    background: #000; border-radius: 12px; overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,.6);
  }
  .player-wrap iframe {
    position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
  }

  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: rgba(0,0,0,.7); color: #fff; text-align: center; padding: 20px;
  }
  .overlay.hidden { display: none; }

  .spinner {
    width: 46px; height: 46px; border-radius: 50%;
    border: 4px solid rgba(255,255,255,.15); border-top-color: #e50914;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-text { font-size: 14px; opacity: .85; }
  .error-title { font-size: 18px; font-weight: 700; color: #ff6b6b; }

  .controls {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    margin-top: 16px;
  }
  .servers { display: flex; flex-wrap: wrap; gap: 8px; }
  .srv-btn {
    background: #17171c; color: #ddd; border: 1px solid #2a2a31;
    padding: 9px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .15s ease;
  }
  .srv-btn:hover { border-color: #e50914; color: #fff; }
  .srv-btn.active {
    background: #e50914; border-color: #e50914; color: #fff;
    box-shadow: 0 4px 14px rgba(229,9,20,.35);
  }
  .srv-btn .ping { font-size: 11px; opacity: .8; margin-left: 6px; }

  .meta {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin-top: 14px; color: #9b9ba3; font-size: 13px;
  }
  .meta .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; }
  .meta .dot.bad { background: #ff6b6b; }

  .footer {
    text-align: center; padding: 24px; color: #6b6b73; font-size: 12px;
  }

  @media (max-width: 600px) {
    .container { padding: 14px; }
    .topbar { padding: 12px 14px; }
    .brand { font-size: 18px; }
    .btn { padding: 11px 14px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">STREAM<span>PLAY</span></div>
  <div style="font-size:12px;color:#9b9ba3;">Multi-server &middot; Auto-fallback</div>
</header>

<main class="container">
  <div class="input-row">
    <input id="imdbInput" type="text" placeholder="Enter IMDB ID (e.g. tt0111161) or TMDB ID" autocomplete="off" />
    <button class="btn" id="loadBtn">Play</button>
  </div>

  <div class="player-wrap" id="playerWrap">
    <iframe id="player" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
    <div class="overlay" id="overlay">
      <div class="spinner" id="spinner"></div>
      <div class="status-text" id="statusText">Enter an IMDB ID above to start streaming</div>
    </div>
  </div>

  <div class="controls">
    <div class="servers" id="serverButtons"></div>
    <div style="flex:1"></div>
    <button class="btn secondary" id="retryBtn">Retry</button>
    <button class="btn secondary" id="nextBtn">Change Server</button>
  </div>

  <div class="meta">
    <span class="dot" id="statusDot"></span>
    <span>Active: <strong id="activeName">—</strong></span>
    <span>&middot;</span>
    <span id="activeUrl" style="word-break:break-all;">No source loaded</span>
  </div>
</main>

<footer class="footer">
  StreamPlay &copy; 2026 &middot; Embeds are provided by third-party servers.
</footer>

<script>
(function () {
  const SERVERS = [
    { name: "Server 1 - VidSrc Pro",   build: id => `https://vidsrc.pro/embed/movie/${id}` },
    { name: "Server 2 - GDrive Player", build: id => `https://databasegdriveplayer.co/player.php?imdb=${id}` },
    { name: "Server 3 - 2Embed",       build: id => `https://www.2embed.to/embed/imdb/movie?id=${id}` },
    { name: "Server 4 - MultiEmbed",   build: id => `https://multiembed.mov/?video_id=${id}&tmdb=1` },
  ];

  const TIMEOUT_MS = 7000;

  const $ = sel => document.querySelector(sel);
  const player     = $("#player");
  const overlay    = $("#overlay");
  const spinner    = $("#spinner");
  const statusText = $("#statusText");
  const activeName = $("#activeName");
  const activeUrl  = $("#activeUrl");
  const statusDot  = $("#statusDot");
  const serverBtnsEl = $("#serverButtons");

  let currentImdb = "";
  let currentServerIdx = -1;
  let probeTimer = null;
  let autoTrying = false;
  let pings = new Array(SERVERS.length).fill(null);

  // Build server buttons
  SERVERS.forEach((s, i) => {
    const b = document.createElement("button");
    b.className = "srv-btn";
    b.dataset.idx = i;
    b.innerHTML = `${s.name.split(" - ")[0]} <span class="ping" data-ping="${i}"></span>`;
    b.title = s.name;
    b.addEventListener("click", () => {
      autoTrying = false;
      loadServer(i);
    });
    serverBtnsEl.appendChild(b);
  });

  function setOverlay({ loading=false, message="", error=false, hidden=false }) {
    overlay.classList.toggle("hidden", hidden);
    spinner.style.display = loading ? "block" : "none";
    statusText.textContent = message;
    statusText.style.color = error ? "#ff6b6b" : "#fff";
  }

  function setActive(idx) {
    document.querySelectorAll(".srv-btn").forEach((el, i) => {
      el.classList.toggle("active", i === idx);
    });
    if (idx >= 0) {
      const s = SERVERS[idx];
      activeName.textContent = s.name;
      activeUrl.textContent = s.build(currentImdb || "—");
      statusDot.classList.remove("bad");
    } else {
      activeName.textContent = "—";
      activeUrl.textContent = "No source loaded";
    }
  }

  function clearProbe() {
    if (probeTimer) { clearTimeout(probeTimer); probeTimer = null; }
    player.onload = null;
    player.onerror = null;
  }

  // Load a specific server. Returns a Promise resolving true if it loaded, false if it timed out / errored.
  function probeServer(idx) {
    return new Promise(resolve => {
      clearProbe();
      const url = SERVERS[idx].build(currentImdb);
      const t0 = performance.now();
      let settled = false;

      const finish = (ok) => {
        if (settled) return;
        settled = true;
        clearProbe();
        if (ok) pings[idx] = Math.round(performance.now() - t0);
        const pingEl = document.querySelector(`[data-ping="${idx}"]`);
        if (pingEl) pingEl.textContent = pings[idx] ? `${pings[idx]}ms` : "fail";
        resolve(ok);
      };

      player.onload  = () => finish(true);
      player.onerror = () => finish(false);
      probeTimer = setTimeout(() => finish(false), TIMEOUT_MS);

      player.src = url;
    });
  }

  function loadServer(idx) {
    if (!currentImdb) {
      setOverlay({ loading:false, message:"Enter an IMDB ID above to start streaming", error:true, hidden:false });
      return;
    }
    currentServerIdx = idx;
    setActive(idx);
    setOverlay({ loading:true, message:`Loading ${SERVERS[idx].name}…`, hidden:false });

    probeServer(idx).then(ok => {
      if (ok) {
        setOverlay({ hidden:true });
      } else {
        statusDot.classList.add("bad");
        setOverlay({ loading:false, message:`${SERVERS[idx].name} did not respond. Try another server.`, error:true, hidden:false });
      }
    });
  }

  async function autoSelect() {
    if (!currentImdb) {
      setOverlay({ loading:false, message:"Enter an IMDB ID above to start streaming", error:true });
      return;
    }
    autoTrying = true;
    for (let i = 0; i < SERVERS.length; i++) {
      if (!autoTrying) return; // user manually picked one
      currentServerIdx = i;
      setActive(i);
      setOverlay({ loading:true, message:`Trying ${SERVERS[i].name}…`, hidden:false });
      const ok = await probeServer(i);
      if (ok && autoTrying) {
        setOverlay({ hidden:true });
        autoTrying = false;
        return;
      }
    }
    autoTrying = false;
    setOverlay({ loading:false, message:"All servers failed to load. Check the IMDB ID or try Retry.", error:true });
  }

  function normalizeId(raw) {
    raw = (raw || "").trim();
    if (!raw) return "";
    // Accept tt-prefixed IMDB or numeric TMDB id
    if (/^tt\d{6,}$/i.test(raw)) return raw.toLowerCase();
    if (/^\d{1,9}$/.test(raw)) return raw;
    return raw; // pass through; some embeds tolerate other formats
  }

  $("#loadBtn").addEventListener("click", () => {
    const id = normalizeId($("#imdbInput").value);
    if (!id) {
      setOverlay({ loading:false, message:"Please enter a valid IMDB ID like tt0111161", error:true });
      return;
    }
    currentImdb = id;
    pings = new Array(SERVERS.length).fill(null);
    document.querySelectorAll(".ping").forEach(el => el.textContent = "");
    autoSelect();
  });

  $("#retryBtn").addEventListener("click", () => {
    if (currentServerIdx >= 0) loadServer(currentServerIdx);
    else autoSelect();
  });

  $("#nextBtn").addEventListener("click", () => {
    if (!currentImdb) return;
    autoTrying = false;
    const next = (currentServerIdx + 1) % SERVERS.length;
    loadServer(next);
  });

  $("#imdbInput").addEventListener("keydown", e => {
    if (e.key === "Enter") $("#loadBtn").click();
  });

  // Allow ?imdb=tt0111161 in URL for direct linking
  const params = new URLSearchParams(location.search);
  const initial = params.get("imdb") || params.get("id");
  if (initial) {
    $("#imdbInput").value = initial;
    $("#loadBtn").click();
  }
})();
</script>

</body>
</html>
